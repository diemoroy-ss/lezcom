name: Deploy to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # Cargar entorno de Node.js (nvm, npm, pm2)
            export PATH=$PATH:/usr/local/bin:/usr/bin
            source ~/.bashrc 2>/dev/null || true
            source ~/.nvm/nvm.sh 2>/dev/null || true
            source ~/.profile 2>/dev/null || true
            
            # Verificar que node y npm están disponibles
            echo "Node: $(node -v 2>/dev/null || echo 'NO ENCONTRADO')"
            echo "NPM: $(npm -v 2>/dev/null || echo 'NO ENCONTRADO')"
            
            # Navegar a la carpeta del proyecto
            cd /var/www/lezcom-landing || { echo "La carpeta /var/www/lezcom-landing no existe"; exit 1; }
            
            # Actualizar código
            git pull origin main
            
            # Instalar dependencias y compilar
            npm install
            npm run build
            
            # Reiniciar la aplicación con PM2
            pm2 restart lezcom-landing || pm2 start npm --name "lezcom-landing" -- start
